name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOTOOLCHAIN: auto

jobs:
  test:
    timeout-minutes: 30
    strategy:
      matrix:
        go: [ '1.24.5' ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Test
        run: go test ./... -coverprofile=coverage.txt
      - name: Create Tag
        if: success() # 仅在测试成功时运行
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          TAG="v0.0.38-$(date +'%Y%m%d%H%M%S')"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update README.md
        if: success() # 仅在测试成功后运行
        run: |
          set -euo pipefail
          sed -i "s|go get github.com/oneclickvirt/UnlockTests@.*|go get github.com/oneclickvirt/UnlockTests@${TAG}|" README.md
        env:
          TAG: ${{ env.TAG }}
      - name: Commit and Push README.md
        if: success() # 仅在测试成功后运行
        run: |
          set -euo pipefail
          git add README.md
          git commit -m "Update README.md with new tag ${TAG}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
