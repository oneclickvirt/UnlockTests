name: Build and Release

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  # release:
  #   types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOTOOLCHAIN: auto

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        check-latest: true
      
    - name: Build and Test on Default Platform
      run: |
        set -euo pipefail
        go build -v ./...
        go test -v ./...
    
    - name: Delete Existing Release Assets
      run: |
        set -euo pipefail
        release_id=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/oneclickvirt/UnlockTests/releases/tags/output" | jq -r '.id')
        if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
          echo "Release tag output not found"
          exit 1
        fi
        echo "Deleting existing release assets..."
        assets=$(curl -s -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/oneclickvirt/UnlockTests/releases/$release_id/assets" | jq -r '.[] | .id')
        for asset in $assets; do
          echo "Deleting asset with ID: $asset"
          curl -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/oneclickvirt/UnlockTests/releases/assets/$asset"
        done
        sleep 60

  release-binary:
    name: Release Go Binary
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        check-latest: true

    - name: Install UPX
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y upx-ucl || sudo apt-get install -y upx || true

    - name: Build and Release
      env:
        GOARM_VALUE: ${{ matrix.goarm }}
      run: |
        set -euo pipefail
        mkdir -p bin
        cd cmd
        if [ -n "${GOARM_VALUE}" ]; then
          export GOARM="${GOARM_VALUE}"
        fi
        CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
          -o ../bin/ut-${{ matrix.goos }}-${{ matrix.goarch }} \
          -v \
          -ldflags="-extldflags=-static -s -w" \
          -trimpath \
          .
        if command -v upx >/dev/null 2>&1; then
          upx --best ../bin/ut-${{ matrix.goos }}-${{ matrix.goarch }} || echo "UPX skipped for ut-${{ matrix.goos }}-${{ matrix.goarch }}"
        else
          echo "UPX not available, skipping compression"
        fi
        
    - name: Upload New Assets
      run: |
        set -euo pipefail
        release_id=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/oneclickvirt/UnlockTests/releases/tags/output" | jq -r '.id')
        if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
          echo "Release tag output not found"
          exit 1
        fi
        echo "Uploading new assets to release..."
        for file in ./bin/*; do
          echo "Uploading $file to release..."
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$file" \
            "https://uploads.github.com/repos/oneclickvirt/UnlockTests/releases/$release_id/assets?name=$(basename "$file")"
          rm -f "$file"
        done

    strategy:
      matrix:
        goos: [windows, freebsd, openbsd, linux, darwin]
        goarch: [amd64, 386]
        exclude:
          - goarch: 386
            goos: darwin
        include:
          - goos: windows
            goarch: 386
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: riscv64
          - goos: linux
            goarch: mips64
          - goos: linux
            goarch: mips64le
          - goos: linux
            goarch: mipsle
          - goos: linux
            goarch: mips
          - goos: linux
            goarch: ppc64
          - goos: linux
            goarch: ppc64le
          - goos: linux
            goarch: s390x
          - goos: freebsd
            goarch: arm64
          - goos: freebsd
            goarch: arm
            goarm: 7
          - goos: openbsd
            goarch: arm64
          - goos: openbsd
            goarch: arm
            goarm: 7
          # - goos: linux
          #   goarch: mipsle
          #   gomips: softfloat
          # - goos: linux
          #   goarch: mips
          #   gomips: softfloat
          # - goos: linux
          #   goarch: arm
          #   goarm: 6
          # - goos: linux
          #   goarch: arm
          #   goarm: 5
