name: Sync provider metadata

on:
  schedule:
    - cron: "53 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-provider-metadata.yml"
      - "cmd/update-provider-metadata/**"
      - "executor/data/**"
      - "executor/provider_metadata.go"
      - "executor/provider_metadata_test.go"
      - "model/model.go"
      - "go.mod"
      - "go.sum"

concurrency:
  group: unlocktests-provider-metadata-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Update snapshot
        run: go run ./cmd/update-provider-metadata
      - name: Validate updater and runtime loader
        run: go test -race ./cmd/update-provider-metadata ./executor
      - name: Vet updater and runtime loader
        run: go vet ./cmd/update-provider-metadata ./executor
      - name: Commit semantic changes
        run: |
          if git diff --quiet -- executor/data/provider-metadata.json executor/data/provider-metadata.manifest.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add executor/data/provider-metadata.json executor/data/provider-metadata.manifest.json
          git commit -m "chore(data): update provider metadata"
          git push
